name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            export PATH="$HOME/.bun/bin:/usr/local/bin:/usr/bin:$PATH"
            APP_DIR="/home/deploy/vipstar"
            APP_NAME="vipstar"
            APP_PORT="3000"
            DOMAIN="vipstar.cc"
            EMAIL="admin@vipstar.cc"

            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR"
            git fetch --all
            git reset --hard origin/main

            bun install --frozen-lockfile
            bun run build

            # Kill anything holding the port (orphan workerd from prior runs)
            fuser -k ${APP_PORT}/tcp 2>/dev/null || true
            sleep 2

            pm2 delete ${APP_NAME} 2>/dev/null || true
            pm2 start "bunx wrangler dev --ip 127.0.0.1 --port ${APP_PORT}" \
              --name ${APP_NAME} \
              --cwd "$APP_DIR" \
              --update-env
            pm2 save
            pm2 startup systemd -u $USER --hp $HOME 2>/dev/null | tail -n1 | sudo bash 2>/dev/null || true

            sleep 5
            curl -fsS -I http://127.0.0.1:${APP_PORT} || (pm2 logs ${APP_NAME} --lines 30 --nostream; exit 1)

            # ========= Auto-setup Nginx + SSL (idempotent) =========
            if ! command -v nginx >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y nginx
            fi
            if ! command -v certbot >/dev/null 2>&1; then
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y certbot python3-certbot-nginx
            fi

            NGINX_CONF="/etc/nginx/sites-available/${APP_NAME}"
            if [ ! -f "$NGINX_CONF" ]; then
              sudo tee "$NGINX_CONF" > /dev/null <<EOF
            server {
                listen 80;
                server_name ${DOMAIN} www.${DOMAIN};

                location / {
                    proxy_pass http://127.0.0.1:${APP_PORT};
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            EOF
              sudo ln -sf "$NGINX_CONF" "/etc/nginx/sites-enabled/${APP_NAME}"
              sudo rm -f /etc/nginx/sites-enabled/default
            fi

            sudo nginx -t && sudo systemctl reload nginx
            sudo systemctl enable nginx

            # Issue/renew SSL automatically (only if DNS resolves to this server)
            if ! sudo test -d "/etc/letsencrypt/live/${DOMAIN}"; then
              sudo certbot --nginx -d ${DOMAIN} -d www.${DOMAIN} \
                --non-interactive --agree-tos -m ${EMAIL} --redirect || \
                echo "⚠️ SSL setup skipped (check DNS A record points to this VPS)"
            fi

            echo "✅ Deployed $(git rev-parse --short HEAD) → https://${DOMAIN}"

