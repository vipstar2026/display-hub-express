name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            export PATH="$HOME/.bun/bin:$PATH"

            # تثبيت Bun إذا غير موجود
            if ! command -v bun &> /dev/null; then
              curl -fsSL https://bun.sh/install | bash
              export PATH="$HOME/.bun/bin:$PATH"
            fi

            # المسار على VPS
            APP_DIR="$HOME/display-hub-express"

            # Clone أو Pull
            if [ ! -d "$APP_DIR" ]; then
              git clone git@github.com:vipstar2026/display-hub-express.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            # تثبيت الحزم والبناء
            bun install
            bun run build

            # إعادة تشغيل التطبيق (PM2)
            if command -v pm2 &> /dev/null; then
              pm2 restart display-hub || pm2 start "bun run start" --name display-hub
              pm2 save
            else
              echo "PM2 not installed - install with: npm i -g pm2"
            fi

            echo "✅ Deploy complete"
