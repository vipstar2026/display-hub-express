name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            export PATH="$HOME/.bun/bin:/usr/bin:$PATH"

            APP_DIR="$HOME/display-hub-express"
            cd "$APP_DIR"

            git fetch origin main
            git reset --hard origin/main

            bun install
            bun run build

            pm2 restart display-hub || pm2 start "bunx wrangler dev --ip 0.0.0.0 --port 3000 --local" --name display-hub
            pm2 save

            echo "✅ Deploy complete"
